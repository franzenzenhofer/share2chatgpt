<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Redirecting to ChatGPT...</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #0d0d0d; color: #a1a1aa;
    }
    .wrap { text-align: center; padding: 24px; }
    .spinner {
      width: 28px; height: 28px; border: 2.5px solid #2a2a2a;
      border-top-color: #10a37f; border-radius: 50%;
      animation: spin 0.7s linear infinite; margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 15px; }
    .error { color: #ef4444; display: none; margin-top: 12px; }
    a { color: #10a37f; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="spinner" id="spinner"></div>
    <p>Redirecting to ChatGPT...</p>
    <p class="error" id="error">
      Missing <code>url</code> parameter.<br>
      <a href="/">Back to share2chatgpt</a>
    </p>
  </div>
  <script>
  (function() {
    var PROMPTS = {
      en: 'Read this page and summarize the key points: {url}',
      de: 'Lies diese Seite und fasse die wichtigsten Punkte zusammen: {url}',
      es: 'Lee esta pagina y resume los puntos clave: {url}',
      fr: 'Lis cette page et resume les points cles: {url}'
    };

    var params = new URLSearchParams(window.location.search);
    var url = params.get('url');

    if (!url) {
      document.getElementById('error').style.display = 'block';
      document.getElementById('spinner').style.display = 'none';
      return;
    }

    var lang = params.get('lang') || 'en';
    var title = params.get('title') || '';
    var text = params.get('text') || '';
    var template = params.get('prompt') || PROMPTS[lang] || PROMPTS.en;

    var prompt = template
      .replace(/\{url\}/g, url)
      .replace(/\{title\}/g, title)
      .replace(/\{text\}/g, text);

    var target = new URLSearchParams();
    target.set('q', prompt);
    if (params.get('hints')) target.set('hints', params.get('hints'));
    if (params.get('temporary-chat')) target.set('temporary-chat', params.get('temporary-chat'));

    window.location.replace('https://chatgpt.com/?' + target.toString());
  })();
  </script>
</body>
</html>
